    <div id="player-container"></div>
    <div id="status">Select a SWF and click "Load". Puzzles run in standalone mode (no Director) with native mouse/keyboard input.</div>

    <script src="node_modules/@ruffle-rs/ruffle/ruffle.js"></script>
    <script>
        let player = null;

        async function loadSWF() {
            const container = document.getElementById('player-container');
            const status = document.getElementById('status');
            const swfFile = document.getElementById('swf-select').value;

            container.innerHTML = '';
            status.textContent = 'Loading ' + swfFile + '...';

            try {
                const ruffle = window.RufflePlayer.newest();
                player = ruffle.createPlayer();
                player.style.width = '100%';
                player.style.height = '100%';
                container.appendChild(player);

                // Do NOT set DirectorInControl - leave it undefined
                // so the SWF enters standalone mode with native mouse/keyboard listeners
                await player.load({
                    url: swfFile,
                    allowScriptAccess: true,
                    autoplay: "on",
                    unmuteOverlay: "hidden",
                    logLevel: "warn",
                    letterbox: "on",
                    // Only pass puzzle number - let DirectorInControl stay undefined
                    parameters: {
                        pNum: "1"
                    }
                });

                status.textContent = 'Loaded: ' + swfFile + ' | Standalone mode (DirectorInControl=undefined) | Click inside to interact';
            } catch (e) {
                status.textContent = 'Error: ' + e.message;
                console.error(e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadSWF();
        });
    </script>
