<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Fool and his Money</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: Georgia, serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Main area */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #game-area {
            width: 800px;
            height: 600px;
            border: 2px solid #c9a84c;
            position: relative;
            overflow: hidden;
        }
        #player-container {
            width: 800px;
            height: 320px;
            background: #000;
        }
        #help-container {
            width: 800px;
            height: 260px;
            background: #000;
            position: relative;
        }
        #scroll-left {
            position: absolute;
            left: 0; top: 0;
            width: 24px; height: 260px;
        }
        #scroll-frame {
            position: absolute;
            left: 24px; top: 0;
            width: 752px; height: 260px;
        }
        #scroll-right {
            position: absolute;
            right: 0; top: 0;
            width: 24px; height: 260px;
        }
        #help-player {
            position: absolute;
            left: 124px; top: 342px;
            width: 600px; height: 216px;
            display: none;
            z-index: 10;
        }
        #menu-container {
            width: 800px;
            height: 20px;
            background: #000;
        }
        #status {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
            text-align: center;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="game-area">
            <div id="player-container"></div>
            <div id="prologue-container" style="display:none; position:absolute; left:0; top:0; width:800px; height:600px; z-index:5;"></div>
            <div id="help-player"></div>
            <div id="help-container">
                <div id="scroll-left"></div>
                <div id="scroll-frame"></div>
                <div id="scroll-right"></div>
            </div>
            <div id="menu-container"></div>
        </div>
        <div id="status">Loading...</div>
        <a href="debug.html" style="color:#555; font-size:11px; margin-top:4px;">Debug Mode</a>
    </div>

    <script src="node_modules/@ruffle-rs/ruffle/ruffle.js"></script>
    <script type="module">
        import { Orchestrator } from './src/orchestrator.js';

        window.addEventListener('DOMContentLoaded', () => {
            const app = new Orchestrator();
            app.init({ gameMode: true });
            window._app = app; // expose for debugging
        });
    </script>
</body>
</html>
